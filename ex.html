  // Migration — runs once, locked
  useEffect(()=>{
    if(locations.length===0)return;
    (async()=>{
      try{
        const metaSnap=await getDoc(doc(db,"meta","v5migration"));
        if(metaSnap.exists()&&metaSnap.data()?.done===true){setMigrationDone(true);return;}
        const existingSnap=await getDocs(collection(db,"masterItems"));
        const existingMasters={};
        existingSnap.docs.forEach(d=>{const m={...d.data(),id:d.id};existingMasters[m.name]=m;});
        const masterMap={};
        let idx=0;
        for(const loc of locations){
          for(const item of (loc.items||[])){
            if(!masterMap[item.name]){
              if(existingMasters[item.name]){masterMap[item.name]=existingMasters[item.name];}
              else{
                const miId=`mi_${item.name.toLowerCase().replace(/[^a-z0-9]/g,"_").slice(0,20)}_${idx}_${Math.random().toString(36).slice(2,6)}`;
                masterMap[item.name]={id:miId,name:item.name,baseUnit:item.baseUnit,outputUnit:item.outputUnit,conversion:item.conversion,costPerUnit:item.costPerUnit||0,costUnit:item.costUnit||"base"};
                await setDoc(doc(db,"masterItems",miId),masterMap[item.name]);
                idx++;
              }
            }
          }
        }
        for(const loc of locations){
          const updatedItems=(loc.items||[]).map(item=>({...item,masterItemId:masterMap[item.name]?.id||item.masterItemId||null}));
          await setDoc(doc(db,"locations",loc.id),{items:updatedItems},{merge:true});
        }
        const allLinkedIds=new Set(locations.flatMap(l=>(l.items||[]).map(i=>masterMap[i.name]?.id)).filter(Boolean));
        for(const d of existingSnap.docs){if(!allLinkedIds.has(d.id))await deleteDoc(doc(db,"masterItems",d.id));}
        await setDoc(doc(db,"meta","v5migration"),{done:true,at:serverTimestamp()});
        setMigrationDone(true);
      }catch(e){console.error("Migration error",e);}
    })();

  // ── HANDLERS ──
  const updateLocItems=async(locId,newItems)=>await setDoc(doc(db,"locations",locId),{items:newItems},{merge:true});

  const handleEntry=async(item,loc)=>{
    const qty=parseFloat(entryQty);
    if(!qty||qty<=0)return showToast("Enter a valid quantity","error");
    if(entryType==="out"){
      const actualQty=entryUnit==="output"?qty/item.conversion:qty;
      if(actualQty>item.baseBal+0.0001)return showToast("Not enough stock!","error");
      await updateLocItems(loc.id,loc.items.map(i=>i.id===item.id?{...i,baseBal:+(i.baseBal-actualQty).toFixed(4),lastUpdated:TODAY()}:i));
      const dLoc=locations.find(l=>l.name===entryDest);
      if(dLoc){
        const dItem=dLoc.items.find(i=>i.name===item.name);
        if(dItem){await updateLocItems(dLoc.id,dLoc.items.map(i=>i.id===dItem.id?{...i,baseBal:+(i.baseBal+actualQty).toFixed(4)}:i));}
        else{
          const newItem={...item,id:`i_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,baseBal:+actualQty.toFixed(4),minStock:0,lastUpdated:TODAY()};
          await updateLocItems(dLoc.id,[...(dLoc.items||[]),newItem]);
        }
      }
      await addDoc(collection(db,"transactions"),{itemId:item.id,itemName:item.name,srcLocId:loc.id,srcLocName:loc.name,destLocId:dLoc?.id||"",destLocName:entryDest,locId:loc.id,locName:loc.name,type:"dispatch",qtyBase:actualQty,qtyDisplay:`${qty} ${entryUnit==="output"?item.outputUnit:item.baseUnit}`,dest:entryDest,note:entryNote,date:TODAY(),createdAt:serverTimestamp()});
      showToast(`Dispatched to ${entryDest} ✓`);
    }else{
      await updateLocItems(loc.id,loc.items.map(i=>i.id===item.id?{...i,baseBal:+(i.baseBal+qty).toFixed(4),lastUpdated:TODAY()}:i));
      const sLoc=locations.find(l=>l.name===entryDest);
      if(sLoc){const sItem=sLoc.items.find(i=>i.name===item.name);if(sItem)await updateLocItems(sLoc.id,sLoc.items.map(i=>i.id===sItem.id?{...i,baseBal:+(i.baseBal-qty).toFixed(4)}:i));}
      await addDoc(collection(db,"transactions"),{itemId:item.id,itemName:item.name,srcLocId:sLoc?.id||"external",srcLocName:entryDest||"External",destLocId:loc.id,destLocName:loc.name,locId:loc.id,locName:loc.name,type:"receive",qtyBase:qty,qtyDisplay:`${qty} ${item.baseUnit}`,dest:loc.name,note:entryNote,date:TODAY(),createdAt:serverTimestamp()});
      showToast("Stock received ✓");
    }
    setExpandedItemId(null);setEntryQty("");setEntryNote("");

  const handleDeleteTx=async(tx)=>{
    try{
      if(tx.type==="dispatch"){
        const sLoc=locations.find(l=>l.id===tx.srcLocId||l.id===tx.locId);
        if(sLoc){const si=sLoc.items.find(i=>i.name===tx.itemName);if(si)await updateLocItems(sLoc.id,sLoc.items.map(i=>i.name===tx.itemName?{...i,baseBal:+(i.baseBal+(tx.qtyBase||0)).toFixed(4)}:i));}
        const dLoc=locations.find(l=>l.id===tx.destLocId)||(tx.dest?locations.find(l=>l.name===tx.dest):null);
        if(dLoc){const di=dLoc.items.find(i=>i.name===tx.itemName);if(di)await updateLocItems(dLoc.id,dLoc.items.map(i=>i.name===tx.itemName?{...i,baseBal:Math.max(0,+(i.baseBal-(tx.qtyBase||0)).toFixed(4))}:i));}
      }else if(tx.type==="receive"){
        const loc=locations.find(l=>l.id===tx.locId);
        if(loc)await updateLocItems(loc.id,loc.items.map(i=>i.name===tx.itemName?{...i,baseBal:Math.max(0,+(i.baseBal-(tx.qtyBase||0)).toFixed(4))}:i));
        const sLoc=locations.find(l=>l.id===tx.srcLocId);
        if(sLoc){const si=sLoc.items.find(i=>i.name===tx.itemName);if(si)await updateLocItems(sLoc.id,sLoc.items.map(i=>i.name===tx.itemName?{...i,baseBal:+(i.baseBal+(tx.qtyBase||0)).toFixed(4)}:i));}
      }else if(tx.type==="adjustment"){
        const loc=locations.find(l=>l.id===tx.locId);
        if(loc)await updateLocItems(loc.id,loc.items.map(i=>i.name===tx.itemName?{...i,baseBal:+(tx.fromBal||0).toFixed(4)}:i));
      }else if(tx.type==="purchase"){
        const loc=locations.find(l=>l.id===tx.locId);
        if(loc)await updateLocItems(loc.id,loc.items.map(i=>i.name===tx.itemName?{...i,baseBal:Math.max(0,+(i.baseBal-(tx.qtyBase||0)).toFixed(4))}:i));
      }else if(tx.type==="consumption"){
        const loc=locations.find(l=>l.id===tx.locId);
        if(loc)await updateLocItems(loc.id,loc.items.map(i=>i.name===tx.itemName?{...i,baseBal:+(i.baseBal+Math.abs(tx.qtyBase||0)).toFixed(4)}:i));
      }
      await deleteDoc(doc(db,"transactions",tx.id));
      showToast("Transaction reversed ✓");setDeleteConfirm(null);
    }catch(e){showToast("Error reversing transaction","error");}
  };

  const handleEODSubmit=async()=>{
    const entries=Object.entries(eodCounts).filter(([,v])=>v!==""&&!isNaN(parseFloat(v)));
    if(entries.length===0)return showToast("No counts entered","error");
    let updated=0;
    const newItems=[...(activeLoc.items||[])];
    const txBatch=[];
    const isOutlet=activeLoc.type==="outlet"||activeLoc.type==="outlet_ro";
    for(const [itemId,valStr] of entries){
      const phys=parseFloat(valStr);
      if(isNaN(phys)||phys<0)continue;
      const idx=newItems.findIndex(i=>i.id===itemId);
      if(idx===-1)continue;
      const item=newItems[idx];
      const diff=+(phys-item.baseBal).toFixed(4);
      if(diff===0)continue;
      newItems[idx]={...item,baseBal:+phys.toFixed(4),lastUpdated:TODAY()};
      const txType=isOutlet?"consumption":"adjustment";
      txBatch.push({itemId:item.id,itemName:item.name,locId:activeLoc.id,locName:activeLoc.name,type:txType,qtyBase:diff,qtyDisplay:`${diff>0?"+":""}${fmt(diff)} ${item.baseUnit}`,fromBal:item.baseBal,toBal:+phys.toFixed(4),note:`${isOutlet?"End of day":"Stock check"}: ${phys} (was ${fmt(item.baseBal)})`,date:TODAY(),createdAt:serverTimestamp()});
      updated++;
    }
    if(updated===0)return showToast("No changes — all counts match","error");
    for(const tx of txBatch)await addDoc(collection(db,"transactions"),tx);
    await updateLocItems(activeLoc.id,newItems);
    showToast(`${updated} item${updated>1?"s":""} updated ✓`);
    setEodMode(false);setEodCounts({});
  };

  const handlePurchaseSubmit=async()=>{
    const entries=Object.entries(purchaseCounts).filter(([,v])=>v!==""&&!isNaN(parseFloat(v))&&parseFloat(v)>0);
    if(entries.length===0)return showToast("No quantities entered","error");

      const idx=newItems.findIndex(i=>i.id===itemId);
      if(idx===-1)continue;
      const item=newItems[idx];
      newItems[idx]={...item,baseBal:+(item.baseBal+qty).toFixed(4),lastUpdated:TODAY()};
      await addDoc(collection(db,"transactions"),{itemId:item.id,itemName:item.name,locId:activeLoc.id,locName:activeLoc.name,type:"purchase",qtyBase:qty,qtyDisplay:`+${fmt(qty)} ${item.baseUnit}`,note:`Purchased: +${fmt(qty)} ${item.baseUnit}`,date:TODAY(),createdAt:serverTimestamp()});

  const handleSavePrice=async()=>{
    const loc=locations.find(l=>(l.items||[]).some(i=>i.id===editPriceItem.id));
    if(!loc)return;
    await updateLocItems(loc.id,loc.items.map(i=>i.id===editPriceItem.id?{...i,costPerUnit:Number(editPriceItem.costPerUnit)||0,costUnit:editPriceItem.costUnit}:i));
    showToast("Price updated ✓");setEditPriceItem(null);
  };

  // ── COMPUTED ──
  const locValue=loc=>(loc.items||[]).reduce((s,i)=>s+itemVal(i),0);
  const totalValue=locations.reduce((s,l)=>s+locValue(l),0);
  const todayTx=transactions.filter(t=>t.date===TODAY());
  const activeLowStock=(activeLoc?.items||[]).filter(i=>i.minStock>0&&i.baseBal<=i.minStock);
  const allItemNames=[...new Set(locations.flatMap(l=>(l.items||[]).map(i=>i.name)))].sort();

  const sortedItems=(loc)=>{
    const items=[...(loc?.items||[])];
    if(sortMode==="az")items.sort((a,b)=>a.name.localeCompare(b.name));
    else if(sortMode==="za")items.sort((a,b)=>b.name.localeCompare(a.name));
    else if(sortMode==="high")items.sort((a,b)=>b.baseBal-a.baseBal);
    else if(sortMode==="low")items.sort((a,b)=>a.baseBal-b.baseBal);
    return items;
  };
  const filteredItems=sortedItems(activeLoc).filter(i=>i.name.toLowerCase().includes(search.toLowerCase()));

  // Date range helper — always uses local date
  const ls=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const getDateRange=(filter)=>{
    const today=TODAY();
    if(filter.date==="today")return{from:today,to:today};
    if(filter.date==="week"){const d=new Date();d.setDate(d.getDate()-6);return{from:ls(d),to:today};}
    if(filter.date==="month"){const d=new Date();d.setDate(1);return{from:ls(d),to:today};}
    if(filter.date==="lastmonth"){const s=new Date();s.setMonth(s.getMonth()-1);s.setDate(1);const e=new Date();e.setDate(0);return{from:ls(s),to:ls(e)};}
    if(filter.date==="custom"&&filter.customFrom&&filter.customTo)return{from:filter.customFrom,to:filter.customTo};
    return{from:"2000-01-01",to:today};
  };
  const txInRange=(t,range)=>t.date>=range.from&&t.date<=range.to;

  // Analytics — Most Dispatched THIS WEEK only
  const _wk=(()=>{const d=new Date();d.setDate(d.getDate()-6);return ls(d);})();
  const _ws={};
  transactions.filter(t=>t.date>=_wk&&t.type==="dispatch").forEach(t=>{if(!_ws[t.itemName])_ws[t.itemName]={name:t.itemName,dispatched:0};_ws[t.itemName].dispatched+=t.qtyBase||0;});
  const mostUsed=Object.values(_ws).filter(s=>s.dispatched>0).sort((a,b)=>b.dispatched-a.dispatched).slice(0,5);
  const thisMonth=TODAY().slice(0,7);
  const lastMonthD=new Date();lastMonthD.setMonth(lastMonthD.getMonth()-1);
  const lastMonth=`${lastMonthD.getFullYear()}-${String(lastMonthD.getMonth()+1).padStart(2,"0")}`;
  const thisMoTx=transactions.filter(t=>t.date?.startsWith(thisMonth)&&t.type==="dispatch").length;
  const lastMoTx=transactions.filter(t=>t.date?.startsWith(lastMonth)&&t.type==="dispatch").length;
  const momChange=lastMoTx>0?Math.round(((thisMoTx-lastMoTx)/lastMoTx)*100):null;

  // Filter transactions with standardized filter object
  const applyFilter=(txList,filter)=>{
    const range=getDateRange(filter);
    return txList.filter(t=>{
      if(!txInRange(t,range))return false;
      if(filter.type&&filter.type!=="all"&&t.type!==filter.type)return false;
      if(filter.loc&&filter.loc!=="all"&&t.locId!==filter.loc&&t.srcLocId!==filter.loc&&t.destLocId!==filter.loc)return false;
      if(filter.search&&!t.itemName?.toLowerCase().includes(filter.search.toLowerCase()))return false;
      return true;
    });
  };

  // Stock movement report data
  const getSmData=()=>{
    const range=getDateRange(smFilter);
    const result=[];
    locations.forEach(loc=>{
      if(smFilter.loc!=="all"&&loc.id!==smFilter.loc)return;
      (loc.items||[]).forEach(item=>{
        if(smFilter.search&&!item.name.toLowerCase().includes(smFilter.search.toLowerCase()))return;
        const locTx=transactions.filter(t=>txInRange(t,range)&&t.itemName===item.name&&(t.locId===loc.id||t.srcLocId===loc.id||t.destLocId===loc.id));
        let purchased=0,received=0,dispatched=0,adjusted=0,consumed=0;
        locTx.forEach(t=>{
          if(t.type==="purchase"&&t.locId===loc.id)purchased+=t.qtyBase||0;
          else if(t.type==="receive"&&t.locId===loc.id)received+=t.qtyBase||0;
          else if(t.type==="dispatch"&&t.locId===loc.id)dispatched+=t.qtyBase||0;
          else if(t.type==="adjustment"&&t.locId===loc.id)adjusted+=t.qtyBase||0;
          else if(t.type==="consumption"&&t.locId===loc.id)consumed+=Math.abs(t.qtyBase||0);
        });
        const totalMovement=purchased+received+dispatched+consumed+Math.abs(adjusted);
        if(totalMovement===0&&smFilter.loc==="all")return;
        const isOutlet=loc.type==="outlet"||loc.type==="outlet_ro";
        const netChange=purchased+received-dispatched-consumed+adjusted;
        const closing=item.baseBal;
        const opening=+(closing-netChange).toFixed(4);
        result.push({itemId:item.id,name:item.name,unit:item.baseUnit,locId:loc.id,locName:loc.name,locColor:loc.color,isOutlet,purchased:+purchased.toFixed(4),received:+received.toFixed(4),dispatched:+dispatched.toFixed(4),consumed:+consumed.toFixed(4),adjusted:+adjusted.toFixed(4),opening,closing,mainMovement:+(isOutlet?consumed:dispatched).toFixed(4),minStock:item.minStock});
      });
    });
    return result.sort((a,b)=>b.mainMovement-a.mainMovement);
  };

  const getConsData=()=>{
    const range=getDateRange(consFilter);
    const result=[];
    locations.filter(l=>l.type==="outlet"||l.type==="outlet_ro").forEach(loc=>{
      if(consFilter.loc!=="all"&&loc.id!==consFilter.loc)return;
      (loc.items||[]).forEach(item=>{
        if(consFilter.search&&!item.name.toLowerCase().includes(consFilter.search.toLowerCase()))return;
        const consumed=transactions.filter(t=>txInRange(t,range)&&t.itemName===item.name&&t.locId===loc.id&&t.type==="consumption").reduce((s,t)=>s+Math.abs(t.qtyBase||0),0);
        if(consumed===0)return;
        result.push({name:item.name,unit:item.baseUnit,locId:loc.id,locName:loc.name,locColor:loc.color,consumed:+consumed.toFixed(4),closing:item.baseBal,minStock:item.minStock});

        ),
        h("div",{style:{background:"#fffdf9",borderTop:"1px solid #e8e2d9",padding:"6px 4px 12px",display:"flex",justifyContent:"center",gap:0,maxWidth:"100%"}},
          ...navItems.map(({id,icon,label})=>h("div",{key:id,className:`nav-item${view===id?" active":""}`,
            onClick:()=>{setView(id);setReportView(null);setMasterView(false);}},
            h("span",{style:{fontSize:15,lineHeight:1}},icon),label
          ))
        )
      )
    ),

    // ── MODALS + OVERLAYS (shared) ──
    h(Modals),
    h(DashDetailModal),

    // ── TOAST ──
    toast&&h("div",{style:{
      position:"fixed",
      top:20,right:20,
      background:toast.type==="error"?"#fef2f2":"#f0fdf4",
      color:toast.type==="error"?"#b91c1c":"#15803d",
      border:`1px solid ${toast.type==="error"?"#fecaca":"#bbf7d0"}`,
      padding:"10px 18px",borderRadius:12,fontSize:12,fontWeight:600,
      boxShadow:"0 4px 20px rgba(0,0,0,.12)",whiteSpace:"nowrap",zIndex:300,
      animation:"toastIn 0.3s ease"
    }},toast.msg)
  );
}

createRoot(document.getElementById("root")).render(h(App));
document.addEventListener("wheel",e=>{if(document.activeElement&&document.activeElement.type==="number")document.activeElement.blur();},{passive:true});
</script>
</body>
</html>
