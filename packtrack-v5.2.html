const TODAY=()=>new Date().toISOString().split("T")[0];
const fmt=n=>{const x=Number(n);return x%1===0?x.toLocaleString("en-IN"):x.toLocaleString("en-IN",{maximumFractionDigits:3});};
const fmtRs=n=>`₹${Number(n).toLocaleString("en-IN",{minimumFractionDigits:0,maximumFractionDigits:2})}`;
const itemVal=item=>{if(!item.costPerUnit||item.costPerUnit===0)return 0;return item.costUnit==="output"?item.baseBal*item.conversion*item.costPerUnit:item.baseBal*item.costPerUnit;};
const stockStatus=item=>{
  if(item.baseBal===0)return{label:"Nil",color:"#ef4444",bg:"#fef2f2"};
  if(item.minStock>0&&item.baseBal<=item.minStock)return{label:"Reorder Required",color:"#d97706",bg:"#fffbeb"};
  return{label:"In Stock",color:"#16a34a",bg:"#f0fdf4"};
};
const locIcon=l=>l.emoji||"📦";
const burnRate=(itemName,txs)=>{
  const w=new Date();w.setDate(w.getDate()-7);const ws=w.toISOString().split("T")[0];
  const d=txs.filter(t=>t.type==="dispatch"&&t.itemName===itemName&&t.date>=ws).reduce((s,t)=>s+(t.qtyBase||0),0);
  return d/7;
};
const daysLeft=(item,txs)=>{const r=burnRate(item.name,txs);if(!r)return null;return Math.round(item.baseBal/r);};

function App(){
  const [locations,setLocations]=useState([]);
  const [masterItems,setMasterItems]=useState([]);
  const [transactions,setTransactions]=useState([]);
  const [activeLocId,setActiveLocId]=useState(null);
  const [view,setView]=useState("home");
  const [modal,setModal]=useState(null);
  const [expandedItemId,setExpandedItemId]=useState(null);
  const [dashModal,setDashModal]=useState(null);
  const [adjustQty,setAdjustQty]=useState("");
  const [entryType,setEntryType]=useState("out");
  const [entryDest,setEntryDest]=useState("");
  const [entryQty,setEntryQty]=useState("");
  const [entryUnit,setEntryUnit]=useState("base");
  const [entryNote,setEntryNote]=useState("");
  const [search,setSearch]=useState("");
  const [toast,setToast]=useState(null);
  const [loading,setLoading]=useState(true);
  const [addItemForm,setAddItemForm]=useState({name:"",baseUnit:"pkt",outputUnit:"pcs",conversion:1,baseBal:"",minStock:5,costPerUnit:"",costUnit:"base",locId:""});
  const [editItem,setEditItem]=useState(null);
  const [editLoc,setEditLoc]=useState(null);
  const [deleteConfirm,setDeleteConfirm]=useState(null);
  const [reportView,setReportView]=useState(null);
  const [reportFilter,setReportFilter]=useState({date:"today",type:"all",loc:"all",search:"",customFrom:"",customTo:""});
  const [smFilter,setSmFilter]=useState({date:"week",loc:"all",customFrom:"",customTo:"",showCustom:false});
  const [consFilter,setConsFilter]=useState({date:"week",loc:"all",customFrom:"",customTo:"",showCustom:false});
  const [smExpandedId,setSmExpandedId]=useState(null);
  const [valLocId,setValLocId]=useState(null);
  const [editPriceItem,setEditPriceItem]=useState(null);
  const [sortMode,setSortMode]=useState("az");
  const [eodMode,setEodMode]=useState(false);
  const [eodCounts,setEodCounts]=useState({});
  const [purchaseMode,setPurchaseMode]=useState(false);
  const [purchaseCounts,setPurchaseCounts]=useState({});
  const [addLocForm,setAddLocForm]=useState({name:"",shortName:"",type:"godown",color:"#16a34a",emoji:"🏭",destinations:[],copyFrom:""});
  const [confirmClose,setConfirmClose]=useState(null);
  const [editMasterItem,setEditMasterItem]=useState(null);
  const [masterView,setMasterView]=useState(false);
  const [migrationDone,setMigrationDone]=useState(false);

  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};
  const activeLoc=locations.find(l=>l.id===activeLocId);

  useEffect(()=>{
    (async()=>{try{for(const loc of SEED){const r=doc(db,"locations",loc.id);const s=await getDoc(r);if(!s.exists())await setDoc(r,loc);}}catch(e){console.error(e);}})();
  },[]);

  useEffect(()=>{
    const unsub=onSnapshot(collection(db,"locations"),snap=>{
      const data=snap.docs.map(d=>({...d.data(),id:d.id}));
      const ord=["jb_godown","av_godown","rr_godown","jb_outlet","kcd_outlet"];
      data.sort((a,b)=>ord.indexOf(a.id)-ord.indexOf(b.id));
      setLocations(data);
      if(data.length>0&&!activeLocId)setActiveLocId(data[0].id);
      setLoading(false);
    });
    return unsub;
  },[]);

  useEffect(()=>{
    const q=query(collection(db,"transactions"),orderBy("createdAt","desc"));
    const unsub=onSnapshot(q,snap=>{setTransactions(snap.docs.map(d=>({...d.data(),id:d.id})));});
    return unsub;
  },[]);

  // Master items listener
  useEffect(()=>{
    const unsub=onSnapshot(collection(db,"masterItems"),snap=>{
      setMasterItems(snap.docs.map(d=>({...d.data(),id:d.id})).sort((a,b)=>a.name.localeCompare(b.name)));
    });
    return unsub;
  },[]);

  // v5.0 Migration — runs once, idempotent
  useEffect(()=>{
    if(locations.length===0)return;
    (async()=>{
      try{
        // Step 1: Load all existing master items from Firebase
        const existingSnap=await getDocs(collection(db,"masterItems"));
        const existingMasters={};
        existingSnap.docs.forEach(d=>{const m={...d.data(),id:d.id};existingMasters[m.name]=m;});

        // Step 2: Build master map — reuse existing if name matches, create new only if needed
        const masterMap={};
        for(const loc of locations){
          for(const item of (loc.items||[])){
            if(!masterMap[item.name]){
              if(existingMasters[item.name]){
                // Reuse existing master item
                masterMap[item.name]=existingMasters[item.name];
              } else {
                // Create new master item
                const miId=`mi_${item.name.toLowerCase().replace(/[^a-z0-9]/g,"_").slice(0,20)}_${Object.keys(masterMap).length.toString(36)}`;
                masterMap[item.name]={id:miId,name:item.name,baseUnit:item.baseUnit,outputUnit:item.outputUnit,conversion:item.conversion,costPerUnit:item.costPerUnit||0,costUnit:item.costUnit||"base"};
                await setDoc(doc(db,"masterItems",miId),masterMap[item.name]);
              }
            }
          }
        }

        // Step 3: Update all location items with correct masterItemId
        for(const loc of locations){
          const updatedItems=(loc.items||[]).map(item=>({...item,masterItemId:masterMap[item.name]?.id||item.masterItemId||null}));
          await setDoc(doc(db,"locations",loc.id),{items:updatedItems},{merge:true});
        }

        // Step 4: Delete orphaned master items (0 locations = not linked to any item)
        const allLinkedIds=new Set(locations.flatMap(l=>(l.items||[]).map(i=>masterMap[i.name]?.id)).filter(Boolean));
        for(const d of existingSnap.docs){
          if(!allLinkedIds.has(d.id)){
            await deleteDoc(doc(db,"masterItems",d.id));
          }
        }

        // Step 5: Mark done
        await setDoc(doc(db,"meta","v5migration"),{done:true,at:serverTimestamp()});
        setMigrationDone(true);
        showToast("✓ Master catalog ready");
      }catch(e){console.error("Migration error",e);}
    })();
  },[locations.length]);

  const updateLocItems=async(locId,newItems)=>await setDoc(doc(db,"locations",locId),{items:newItems},{merge:true});

  const handleEntry=async(item,loc)=>{
    const qty=parseFloat(entryQty);
    if(!qty||qty<=0)return showToast("Enter a valid quantity","error");
    if(entryType==="out"){
      const actualQty=entryUnit==="output"?qty/item.conversion:qty;
      if(actualQty>item.baseBal+0.0001)return showToast("Not enough stock!","error");
      await updateLocItems(loc.id,loc.items.map(i=>i.id===item.id?{...i,baseBal:+(i.baseBal-actualQty).toFixed(4),lastUpdated:TODAY()}:i));
      const dLoc=locations.find(l=>l.name===entryDest);
      if(dLoc){
        const dItem=dLoc.items.find(i=>i.name===item.name);
        if(dItem){
          // Item exists — update balance
          await updateLocItems(dLoc.id,dLoc.items.map(i=>i.id===dItem.id?{...i,baseBal:+(i.baseBal+actualQty).toFixed(4)}:i));
        } else {
          // Auto-create item at destination
          const newItem={...item,id:`i_${Date.now()}`,baseBal:+actualQty.toFixed(4),minStock:0,lastUpdated:TODAY()};
          await updateLocItems(dLoc.id,[...(dLoc.items||[]),newItem]);
          showToast(`"${item.name}" auto-added to ${dLoc.name} ✓`);
        }
      }
      await addDoc(collection(db,"transactions"),{itemId:item.id,itemName:item.name,srcLocId:loc.id,srcLocName:loc.name,destLocId:dLoc?.id||"",destLocName:entryDest,locId:loc.id,locName:loc.name,type:"dispatch",qtyBase:actualQty,qtyDisplay:`${qty} ${entryUnit==="output"?item.outputUnit:item.baseUnit}`,dest:entryDest,note:entryNote,date:TODAY(),createdAt:serverTimestamp()});
      showToast(`Dispatched to ${entryDest} ✓`);
    } else {
      await updateLocItems(loc.id,loc.items.map(i=>i.id===item.id?{...i,baseBal:+(i.baseBal+qty).toFixed(4),lastUpdated:TODAY()}:i));
      const sLoc=locations.find(l=>l.name===entryDest);
      if(sLoc){const sItem=sLoc.items.find(i=>i.name===item.name);if(sItem)await updateLocItems(sLoc.id,sLoc.items.map(i=>i.id===sItem.id?{...i,baseBal:+(i.baseBal-qty).toFixed(4)}:i));}
      await addDoc(collection(db,"transactions"),{itemId:item.id,itemName:item.name,srcLocId:sLoc?.id||"external",srcLocName:entryDest||"External",destLocId:loc.id,destLocName:loc.name,locId:loc.id,locName:loc.name,type:"receive",qtyBase:qty,qtyDisplay:`${qty} ${item.baseUnit}`,dest:loc.name,note:entryNote,date:TODAY(),createdAt:serverTimestamp()});
      showToast("Stock received ✓");
    }
    setExpandedItemId(null);setEntryQty("");setEntryNote("");
  };

  const handleAdjust=async(item,loc)=>{
    const phys=parseFloat(adjustQty);
    if(isNaN(phys)||phys<0)return showToast("Enter a valid count","error");
    const diff=+(phys-item.baseBal).toFixed(4);
    if(diff===0)return showToast("No change — already matches","error");
    // Step 1: update balance
    await updateLocItems(loc.id,loc.items.map(i=>i.id===item.id?{...i,baseBal:+phys.toFixed(4),lastUpdated:TODAY()}:i));
    // Step 2: log — only after balance update succeeds
    await addDoc(collection(db,"transactions"),{itemId:item.id,itemName:item.name,locId:loc.id,locName:loc.name,type:"adjustment",qtyBase:diff,qtyDisplay:`${diff>0?"+":""}${fmt(diff)} ${item.baseUnit}`,fromBal:item.baseBal,toBal:+phys.toFixed(4),note:`Physical count: ${phys} (was ${fmt(item.baseBal)})`,date:TODAY(),createdAt:serverTimestamp()});
    showToast(`Adjusted: ${fmt(item.baseBal)} → ${fmt(phys)} ${item.baseUnit} ✓`);
    setExpandedItemId(null);setAdjustQty("");
  };

  const handleDeleteTx=async(tx)=>{
    try{
      if(tx.type==="dispatch"){
        const sLoc=locations.find(l=>l.id===tx.srcLocId);
        if(sLoc){const si=sLoc.items.find(i=>i.name===tx.itemName);if(si)await updateLocItems(sLoc.id,sLoc.items.map(i=>i.name===tx.itemName?{...i,baseBal:+(i.baseBal+(tx.qtyBase||0)).toFixed(4)}:i));}
        const dLoc=locations.find(l=>l.id===tx.destLocId||l.name===tx.dest);
        if(dLoc){const di=dLoc.items.find(i=>i.name===tx.itemName);if(di)await updateLocItems(dLoc.id,dLoc.items.map(i=>i.name===tx.itemName?{...i,baseBal:Math.max(0,+(i.baseBal-(tx.qtyBase||0)).toFixed(4))}:i));}
      } else if(tx.type==="receive"){
        const loc=locations.find(l=>l.id===tx.locId);
        if(loc){await updateLocItems(loc.id,loc.items.map(i=>i.name===tx.itemName?{...i,baseBal:Math.max(0,+(i.baseBal-(tx.qtyBase||0)).toFixed(4))}:i));}
        const sLoc=locations.find(l=>l.id===tx.srcLocId);
        if(sLoc){const si=sLoc.items.find(i=>i.name===tx.itemName);if(si)await updateLocItems(sLoc.id,sLoc.items.map(i=>i.name===tx.itemName?{...i,baseBal:+(i.baseBal+(tx.qtyBase||0)).toFixed(4)}:i));}
      } else if(tx.type==="adjustment"){
        const loc=locations.find(l=>l.id===tx.locId);
        if(loc){await updateLocItems(loc.id,loc.items.map(i=>i.name===tx.itemName?{...i,baseBal:+(tx.fromBal||0).toFixed(4)}:i));}
      } else if(tx.type==="purchase"){
        // Reverse: subtract the purchased quantity from stock
        const loc=locations.find(l=>l.id===tx.locId);
        if(loc){await updateLocItems(loc.id,loc.items.map(i=>i.name===tx.itemName?{...i,baseBal:Math.max(0,+(i.baseBal-(tx.qtyBase||0)).toFixed(4))}:i));}
      } else if(tx.type==="consumption"){
        // Reverse: add back the consumed quantity (negative diff stored in qtyBase, use abs)
        const loc=locations.find(l=>l.id===tx.locId);

          h("button",{className:"btn btn-ghost",style:{width:"100%",marginTop:16},onClick:()=>{setValLocId(null);setEditPriceItem(null);}},"Close")
        )
      )
    ),

    // ── EDIT MASTER ITEM MODAL ──
    modal==="editMaster"&&editMasterItem&&h("div",{className:"overlay",onClick:()=>{setModal(null);setEditMasterItem(null);}},
      h("div",{style:{width:"100%",maxWidth:520,borderRadius:"20px 20px 0 0",maxHeight:"92vh",overflowY:"auto"},onClick:e=>e.stopPropagation()},
        h("div",{className:"sheet",style:{background:"#fffdf9",padding:22,borderRadius:"20px 20px 0 0"}},
          h(SheetHandle),
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
            h("div",{style:{fontSize:15,fontWeight:700}},"Edit Master Item"),
            h("button",{className:"btn btn-ghost",style:{fontSize:11,padding:"6px 12px"},onClick:()=>{setModal(null);setEditMasterItem(null);}},"✕ Close")
          ),
          h("div",{style:{background:"#eef2ff",borderRadius:10,padding:"10px 14px",marginBottom:18,fontSize:11,color:"#4338ca",lineHeight:1.5}},
            "⚡ Changes here will update ",h("strong",null,"all locations")," that carry this item."
          ),
          h(Field,{label:"Item Name"},
            h("input",{className:"inp",value:editMasterItem.name,onChange:e=>setEditMasterItem(f=>({...f,name:e.target.value}))})
          ),
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
            h(Field,{label:"Base Unit"},
              h("select",{value:editMasterItem.baseUnit,onChange:e=>setEditMasterItem(f=>({...f,baseUnit:e.target.value}))},
                ...["pcs","pkt","kg","kgs","gms","Box","pc","pcs","ltr","ml"].map(u=>h("option",{key:u,value:u},u))
              )
            ),
            h(Field,{label:"Output Unit"},
              h("select",{value:editMasterItem.outputUnit,onChange:e=>setEditMasterItem(f=>({...f,outputUnit:e.target.value}))},
                ...["pcs","pkt","kg","kgs","gms","Box","pc","ltr","ml"].map(u=>h("option",{key:u,value:u},u))
              )
            )
          ),
          h(Field,{label:`1 ${editMasterItem.baseUnit} = ? ${editMasterItem.outputUnit}`},
            h("input",{className:"inp",type:"number",min:"0.001",value:editMasterItem.conversion,onChange:e=>setEditMasterItem(f=>({...f,conversion:e.target.value}))})
          ),
          h(Field,{label:"Cost per unit (₹)"},
            h("input",{className:"inp",type:"number",min:"0",placeholder:"0.00",value:editMasterItem.costPerUnit||"",onChange:e=>setEditMasterItem(f=>({...f,costPerUnit:e.target.value}))})
          ),
          h(Field,{label:"Price is per"},
            h(LocBtns,{options:[["base",editMasterItem.baseUnit],["output",editMasterItem.outputUnit]],value:editMasterItem.costUnit||"base",onChange:v=>setEditMasterItem(f=>({...f,costUnit:v}))})
          ),
          h("div",{style:{background:"#f7f4ef",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:11,color:"#9e9080"}},
            `Carried by: ${locations.filter(l=>(l.items||[]).some(i=>i.masterItemId===editMasterItem.id)).map(l=>l.shortName).join(", ")||"—"}`
          ),
          h("div",{style:{display:"flex",gap:9}},
            h("button",{className:"btn btn-ghost",style:{flex:1},onClick:()=>{setModal(null);setEditMasterItem(null);}},"Cancel"),
            h("button",{className:"btn btn-dark",style:{flex:2},onClick:handleEditMasterItem},"✓ Save & Propagate")
          )
        )
      )
    ),

    // ── ADD ITEM MODAL ──
    modal==="addItem"&&h("div",{className:"overlay",onClick:()=>setModal(null)},
      h("div",{style:{width:"100%",maxWidth:520,borderRadius:"20px 20px 0 0",maxHeight:"92vh",overflowY:"auto"},onClick:e=>e.stopPropagation()},
        h("div",{className:"sheet",style:{background:"#fffdf9",padding:22,borderRadius:"20px 20px 0 0"}},
          h(SheetHandle),
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}},
            h("div",{style:{fontSize:15,fontWeight:700}},"Add New Item"),
            h("button",{className:"btn btn-ghost",style:{fontSize:11,padding:"6px 12px"},onClick:()=>setModal(null)},"✕ Close")
          ),
          h(Field,{label:"Add to Location *"},
            h("select",{value:addItemForm.locId||activeLocId||"",onChange:e=>setAddItemForm(f=>({...f,locId:e.target.value}))},
              h("option",{value:""},"Select location..."),
              ...locations.map(l=>h("option",{key:l.id,value:l.id},`${locIcon(l)} ${l.name}`))
            )
          ),
          h(Field,{label:"Item Name *"},h("input",{className:"inp",placeholder:"e.g. 300 ml Paper Cup",value:addItemForm.name,onChange:e=>setAddItemForm(f=>({...f,name:e.target.value})),autoFocus:true})),
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
            h(Field,{label:"Base Unit"},h("select",{value:addItemForm.baseUnit,onChange:e=>setAddItemForm(f=>({...f,baseUnit:e.target.value}))},
              ...["pkt","pcs","kg","kgs","Box","rolls","pc","meters"].map(o=>h("option",{key:o,value:o},o)))),
            h(Field,{label:"Output Unit"},h("select",{value:addItemForm.outputUnit,onChange:e=>setAddItemForm(f=>({...f,outputUnit:e.target.value}))},
              ...["pcs","pkt","kg","kgs","Box","rolls","pc","meters"].map(o=>h("option",{key:o,value:o},o)))),
            h(Field,{label:`1 ${addItemForm.baseUnit} = ? ${addItemForm.outputUnit}`},h("input",{className:"inp",type:"number",min:"0.001",value:addItemForm.conversion,onChange:e=>setAddItemForm(f=>({...f,conversion:e.target.value}))})),
            h(Field,{label:"Min Stock Alert"},h("input",{className:"inp",type:"number",min:"0",value:addItemForm.minStock,onChange:e=>setAddItemForm(f=>({...f,minStock:e.target.value}))}))
          ),
          h(Field,{label:`Opening Stock (${addItemForm.baseUnit})`},h("input",{className:"inp",type:"number",min:"0",placeholder:"0",value:addItemForm.baseBal,onChange:e=>setAddItemForm(f=>({...f,baseBal:e.target.value}))})),
          h("div",{style:{background:"#f7f4ef",borderRadius:11,padding:"12px 14px",marginBottom:13}},
            h("div",{style:{fontSize:10,fontWeight:700,color:"#9e9080",letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:10}},"Price (Optional)"),
            h(Field,{label:"Cost per unit (₹)"},h("input",{className:"inp",type:"number",min:"0",placeholder:"0.00",value:addItemForm.costPerUnit,onChange:e=>setAddItemForm(f=>({...f,costPerUnit:e.target.value}))})),
            h(Field,{label:"Price is per"},h(LocBtns,{options:[["base",addItemForm.baseUnit],["output",addItemForm.outputUnit]],value:addItemForm.costUnit,onChange:v=>setAddItemForm(f=>({...f,costUnit:v}))}))
          ),
          h("div",{style:{display:"flex",gap:9}},
            h("button",{className:"btn btn-ghost",style:{flex:1},onClick:()=>setModal(null)},"Cancel"),
            h("button",{className:"btn btn-dark",style:{flex:2},onClick:handleAddItem},"Add Item")
          )
        )
      )
    ),

    // ── EDIT ITEM MODAL ──
    modal==="editItem"&&editItem&&h("div",{className:"overlay",onClick:()=>{setModal(null);setEditItem(null);}},
      h("div",{style:{width:"100%",maxWidth:520,borderRadius:"20px 20px 0 0",maxHeight:"92vh",overflowY:"auto"},onClick:e=>e.stopPropagation()},
        h("div",{className:"sheet",style:{background:"#fffdf9",padding:22,borderRadius:"20px 20px 0 0"}},
          h(SheetHandle),
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}},
            h("div",{style:{fontSize:15,fontWeight:700}},"Edit Item"),
            h("button",{className:"btn btn-ghost",style:{fontSize:11,padding:"6px 12px"},onClick:()=>{setModal(null);setEditItem(null);}},"✕ Close")
          ),
          // Show item name as read-only with link to master catalog
          h("div",{style:{background:"#f7f4ef",borderRadius:11,padding:"13px 15px",marginBottom:14}},
            h("div",{style:{fontSize:13,fontWeight:700,marginBottom:4}},editItem.name),
            h("div",{style:{fontSize:10,color:"#9e9080"}},`${editItem.baseUnit} · 1${editItem.baseUnit}=${editItem.conversion}${editItem.outputUnit}`),
            editItem.costPerUnit>0&&h("div",{style:{fontSize:10,color:"#16a34a",marginTop:2}},`₹${editItem.costPerUnit} / ${editItem.costUnit==="output"?editItem.outputUnit:editItem.baseUnit}`)
          ),
          editItem.masterItemId&&h("div",{style:{background:"#eef2ff",borderRadius:10,padding:"10px 14px",marginBottom:18,fontSize:11,color:"#4338ca",lineHeight:1.5,cursor:"pointer"},
            onClick:()=>{const mi=masterItems.find(m=>m.id===editItem.masterItemId);if(mi){setEditMasterItem({...mi});setModal("editMaster");}}},
            "✏️ To rename, reprice or change units — edit in ",h("strong",null,"Master Catalog")," (Locations tab). Changes will apply to all locations."
          ),
          h(Field,{label:"Min Stock Alert (this location only)"},
            h("input",{className:"inp",type:"number",min:"0",value:editItem.minStock,onChange:e=>setEditItem(f=>({...f,minStock:e.target.value})),placeholder:"0"})
          ),
          h("div",{style:{display:"flex",gap:9,marginBottom:9}},
            h("button",{className:"btn btn-ghost",style:{flex:1},onClick:()=>{setModal(null);setEditItem(null);}},"Cancel"),
            h("button",{className:"btn btn-dark",style:{flex:2},onClick:handleEditItem},"Save Min Stock")
          ),
          h("button",{className:"btn btn-danger",style:{width:"100%"},onClick:()=>setModal("deleteItem")},"🗑 Delete This Item")
        )
      )
    ),

    // ── DELETE ITEM CONFIRM ──
    modal==="deleteItem"&&editItem&&h("div",{className:"overlay",onClick:()=>setModal("editItem")},
      h("div",{style:{width:"100%",maxWidth:480,borderRadius:"20px 20px 0 0"},onClick:e=>e.stopPropagation()},
        h("div",{className:"sheet",style:{background:"#fffdf9",padding:24,borderRadius:"20px 20px 0 0"}},
          h(SheetHandle),
          h("div",{style:{fontSize:16,fontWeight:700,marginBottom:6,color:"#b91c1c"}},"🗑 Delete Item?"),
          h("div",{style:{fontSize:12,color:"#9e9080",marginBottom:14}},"Item removed from this location. Past transactions are kept."),
          h("div",{style:{background:"#fef2f2",borderRadius:10,padding:"12px 14px",marginBottom:18,fontSize:13,fontWeight:700}},editItem.name),
          h("div",{style:{display:"flex",gap:9}},
            h("button",{className:"btn btn-ghost",style:{flex:1},onClick:()=>setModal("editItem")},"Cancel"),
            h("button",{className:"btn",style:{flex:2,background:"#b91c1c",color:"#fff",border:"none"},onClick:handleDeleteItem},"Yes, Delete")
          )
        )
      )
    ),

    // ── EDIT LOCATION MODAL ──
    modal==="editLoc"&&editLoc&&h("div",{className:"overlay",onClick:()=>{setModal(null);setEditLoc(null);}},
      h("div",{style:{width:"100%",maxWidth:520,borderRadius:"20px 20px 0 0",maxHeight:"92vh",overflowY:"auto"},onClick:e=>e.stopPropagation()},
        h("div",{className:"sheet",style:{background:"#fffdf9",padding:22,borderRadius:"20px 20px 0 0"}},
          h(SheetHandle),
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}},
            h("div",{style:{fontSize:15,fontWeight:700}},"Edit Location"),
            h("button",{className:"btn btn-ghost",style:{fontSize:11,padding:"6px 12px"},onClick:()=>{setModal(null);setEditLoc(null);}},"✕ Close")
          ),
          h(Field,{label:"Full Name"},h("input",{className:"inp",value:editLoc.name,onChange:e=>setEditLoc(f=>({...f,name:e.target.value}))})),
          h(Field,{label:"Short Name (tab label)"},h("input",{className:"inp",value:editLoc.shortName||"",onChange:e=>setEditLoc(f=>({...f,shortName:e.target.value}))})),
          h(Field,{label:"Emoji"},h("div",{className:"emoji-grid"},...EMOJIS.map(em=>h("div",{key:em,className:`emoji-opt${editLoc.emoji===em?" selected":""}`,onClick:()=>setEditLoc(f=>({...f,emoji:em}))},em)))),
          h(Field,{label:"Color"},h("div",{className:"color-grid"},...COLORS.map(c=>h("div",{key:c,className:`color-opt${editLoc.color===c?" selected":""}`,style:{background:c},onClick:()=>setEditLoc(f=>({...f,color:c}))})))),
          h("div",{style:{display:"flex",gap:9}},
            h("button",{className:"btn btn-ghost",style:{flex:1},onClick:()=>{setModal(null);setEditLoc(null);}},"Cancel"),
            h("button",{className:"btn btn-dark",style:{flex:2},onClick:handleEditLoc},"Save Changes")
          )
        )
      )
    ),

    // ── ADD LOCATION MODAL ──
    modal==="addLoc"&&h("div",{className:"overlay",onClick:()=>setModal(null)},
      h("div",{style:{width:"100%",maxWidth:520,borderRadius:"20px 20px 0 0",maxHeight:"92vh",overflowY:"auto"},onClick:e=>e.stopPropagation()},
        h("div",{className:"sheet",style:{background:"#fffdf9",padding:22,borderRadius:"20px 20px 0 0"}},
          h(SheetHandle),
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}},
            h("div",{style:{fontSize:15,fontWeight:700}},"Add New Location"),
            h("button",{className:"btn btn-ghost",style:{fontSize:11,padding:"6px 12px"},onClick:()=>setModal(null)},"✕ Close")
          ),
          h(Field,{label:"Full Name *"},h("input",{className:"inp",placeholder:"e.g. New Godown",value:addLocForm.name,onChange:e=>setAddLocForm(f=>({...f,name:e.target.value})),autoFocus:true})),
          h(Field,{label:"Short Name (tab label) *"},h("input",{className:"inp",placeholder:"e.g. NG",value:addLocForm.shortName,onChange:e=>setAddLocForm(f=>({...f,shortName:e.target.value}))})),
          h(Field,{label:"Location Type"},
            h("div",{style:{display:"flex",gap:6}},
              ...["godown","outlet","outlet_ro"].map(t=>h("button",{key:t,className:"btn",style:{flex:1,padding:"9px 6px",fontSize:11,background:addLocForm.type===t?"#111":"#f0efe9",color:addLocForm.type===t?"#fff":"#666",border:"none"},onClick:()=>setAddLocForm(f=>({...f,type:t}))},
                t==="godown"?"Godown":t==="outlet"?"Outlet":"Receive Only"
              ))
            )
          ),
          addLocForm.type!=="outlet_ro"&&h(Field,{label:"Can dispatch to"},
            h("div",{style:{display:"flex",flexDirection:"column",gap:6}},
              ...locations.filter(l=>l.type!=="godown").map(l=>h("label",{key:l.id,style:{display:"flex",alignItems:"center",gap:8,fontSize:13,cursor:"pointer"}},
                h("input",{type:"checkbox",checked:addLocForm.destinations.includes(l.name),
                  onChange:e=>setAddLocForm(f=>({...f,destinations:e.target.checked?[...f.destinations,l.name]:f.destinations.filter(d=>d!==l.name)}))
                }),
                `${locIcon(l)} ${l.name}`
              ))
            )
          ),
          h(Field,{label:"Emoji"},h("div",{className:"emoji-grid"},...EMOJIS.map(em=>h("div",{key:em,className:`emoji-opt${addLocForm.emoji===em?" selected":""}`,onClick:()=>setAddLocForm(f=>({...f,emoji:em}))},em)))),
          h(Field,{label:"Color"},h("div",{className:"color-grid"},...COLORS.map(c=>h("div",{key:c,className:`color-opt${addLocForm.color===c?" selected":""}`,style:{background:c},onClick:()=>setAddLocForm(f=>({...f,color:c}))})))),
          h(Field,{label:"Copy item list from (optional — starts at 0 stock)"},
            h("select",{value:addLocForm.copyFrom,onChange:e=>setAddLocForm(f=>({...f,copyFrom:e.target.value}))},
              h("option",{value:""},"Start empty"),
              ...locations.map(l=>h("option",{key:l.id,value:l.id},l.name))
            )
          ),
          h("div",{style:{display:"flex",gap:9}},
            h("button",{className:"btn btn-ghost",style:{flex:1},onClick:()=>setModal(null)},"Cancel"),
            h("button",{className:"btn btn-dark",style:{flex:2},onClick:handleAddLocation},"Add Location")
          )
        )
      )
    ),

    // TOAST
    toast&&h("div",{style:{position:"fixed",bottom:85,left:"50%",transform:"translateX(-50%)",background:toast.type==="error"?"#fef2f2":"#f0fdf4",color:toast.type==="error"?"#b91c1c":"#15803d",border:`1px solid ${toast.type==="error"?"#fecaca":"#bbf7d0"}`,padding:"10px 18px",borderRadius:12,fontSize:12,fontWeight:600,boxShadow:"0 4px 20px rgba(0,0,0,.12)",whiteSpace:"nowrap",zIndex:300,animation:"toastIn 0.3s ease"}},toast.msg)
  );
}

createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
